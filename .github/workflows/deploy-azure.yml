name: Deploy to Azure

concurrency:
  group: deploy-azure-${{ github.event.inputs.functionAppName || vars.AZURE_FUNCTION_APP_NAME || 'func-opencode-pro' }}
  cancel-in-progress: false

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'infra/**'
      - 'host.json'
      - 'package.json'
      - 'package-lock.json'
      - '.funcignore'
      - '.github/workflows/deploy-azure.yml'
      - 'eslint.config.js'
  workflow_dispatch:
    inputs:
      location:
        description: 'Azure region'
        required: false
        type: string
        default: 'eastus'
      resourceGroupName:
        description: 'Resource Group name'
        required: false
        type: string
        default: 'rg-opencode-pro'
      functionAppName:
        description: 'Function App name (globally unique)'
        required: false
        type: string
        default: 'func-opencode-pro'
      keyVaultName:
        description: 'Key Vault name (globally unique)'
        required: false
        type: string
        default: 'kv-opencode-pro'
      storageAccountName:
        description: 'Storage Account name (globally unique)'
        required: false
        type: string
        default: 'stopencodepro'

env:
  AZURE_LOCATION: ${{ github.event.inputs.location || vars.AZURE_LOCATION || 'eastus' }}
  AZURE_RESOURCE_GROUP_NAME: ${{ github.event.inputs.resourceGroupName || vars.AZURE_RESOURCE_GROUP_NAME || 'rg-opencode-pro' }}
  AZURE_FUNCTION_APP_NAME: ${{ github.event.inputs.functionAppName || vars.AZURE_FUNCTION_APP_NAME || 'func-opencode-pro' }}
  AZURE_KEY_VAULT_NAME: ${{ github.event.inputs.keyVaultName || vars.AZURE_KEY_VAULT_NAME || 'kv-opencode-pro' }}
  AZURE_STORAGE_ACCOUNT_NAME: ${{ github.event.inputs.storageAccountName || vars.AZURE_STORAGE_ACCOUNT_NAME || 'stopencodepro' }}

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build Function App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Run build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: function-app
          path: |
            src/
            node_modules/
            host.json
            package.json
            package-lock.json

  deploy:
    name: Deploy Infrastructure & Code
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Azure OIDC login
        uses: azure/login@2dd0bbf4064d5a1812889dc200bb8eed2597f82a # v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate deployment configuration
        run: |
          test -n "${AZURE_LOCATION}"
          test -n "${AZURE_RESOURCE_GROUP_NAME}"
          test -n "${AZURE_FUNCTION_APP_NAME}"
          test -n "${AZURE_KEY_VAULT_NAME}"
          test -n "${AZURE_STORAGE_ACCOUNT_NAME}"

      - name: Deploy Bicep template
        uses: azure/arm-deploy@a1361c2c2cd398621955b16ca32e01c65ea340f5 # v2
        with:
          scope: subscription
          region: ${{ env.AZURE_LOCATION }}
          template: ./infra/main.bicep
          parameters: |
            location=${{ env.AZURE_LOCATION }}
            resourceGroupName=${{ env.AZURE_RESOURCE_GROUP_NAME }}
            functionAppName=${{ env.AZURE_FUNCTION_APP_NAME }}
            keyVaultName=${{ env.AZURE_KEY_VAULT_NAME }}
            storageAccountName=${{ env.AZURE_STORAGE_ACCOUNT_NAME }}
          deploymentName: opencode-pro-${{ github.run_number }}
          failOnStdErr: true

      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: function-app

      - name: Deploy to Azure Functions
        uses: azure/functions-action@c9cc8ee93d1285e2a17312cc8357dc1775955272 # v1
        with:
          app-name: ${{ env.AZURE_FUNCTION_APP_NAME }}
          package: '.'
          respect-funcignore: true

      - name: Smoke test webhook endpoint
        env:
          WEBHOOK_URL: https://${{ env.AZURE_FUNCTION_APP_NAME }}.azurewebsites.net/api/webhook
        run: |
          status_code=$(curl --silent --show-error --retry 4 --retry-delay 5 --retry-all-errors --connect-timeout 10 --max-time 30 --output /tmp/webhook-smoke-response.txt --write-out "%{http_code}" --request POST --header "content-type: application/json" --data '{"smokeTest":true}' "${WEBHOOK_URL}")
          echo "Webhook smoke test status: ${status_code}"

          case "${status_code}" in
            200|202|400|401|403)
              echo "Smoke test passed for ${WEBHOOK_URL}"
              ;;
            *)
              echo "Smoke test failed for ${WEBHOOK_URL} with status ${status_code}"
              exit 1
              ;;
          esac
