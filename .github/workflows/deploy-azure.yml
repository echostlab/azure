name: deploy-azure

on:
  workflow_dispatch:
    inputs:
      location:
        description: "Azure region for deployment"
        type: string
        required: true
        default: "eastus"
      resourceGroupName:
        description: "Azure resource group name"
        type: string
        required: true
        default: "actions-nsg-rg"
      nsgName:
        description: "NSG resource name"
        type: string
        required: true
        default: "actions_NSG"

concurrency:
  group: azure-deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate with Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create resource group if not exists
        uses: azure/cli@v2
        env:
          RG_NAME: ${{ github.event.inputs.resourceGroupName }}
          LOCATION: ${{ github.event.inputs.location }}
        with:
          inlineScript: |
            set -euo pipefail
            az group create \
              --name "$RG_NAME" \
              --location "$LOCATION"

      - name: Deploy Bicep template
        uses: azure/cli@v2
        env:
          RG_NAME: ${{ github.event.inputs.resourceGroupName }}
          LOCATION: ${{ github.event.inputs.location }}
          NSG_NAME: ${{ github.event.inputs.nsgName }}
        with:
          inlineScript: |
            set -euo pipefail
            az deployment group create \
              --name "actions-nsg-deployment" \
              --resource-group "$RG_NAME" \
              --template-file actions-nsg-deployment.bicep \
              --parameters \
                location="$LOCATION" \
                nsgName="$NSG_NAME"

      - name: Report deployment failure
        if: failure()
        run: |
          echo "❌ Deployment failed. See details at:"
          echo "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"