name: Deploy to Azure

on:
  workflow_dispatch:
    inputs:
      location:
        description: 'Azure region'
        required: true
        type: string
        default: 'eastus'
      resourceGroupName:
        description: 'Resource Group name'
        required: true
        type: string
        default: 'rg-opencode-pro'
      functionAppName:
        description: 'Function App name (globally unique)'
        required: true
        type: string
        default: 'func-opencode-pro'
      keyVaultName:
        description: 'Key Vault name (globally unique)'
        required: true
        type: string
        default: 'kv-opencode-pro'
      storageAccountName:
        description: 'Storage Account name (globally unique)'
        required: true
        type: string
        default: 'stopencodepro'

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build Function App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: function-app
          path: |
            src/
            node_modules/
            host.json
            package.json
            package-lock.json

  deploy:
    name: Deploy Infrastructure & Code
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Azure OIDC login
        uses: azure/login@2dd0bbf4064d5a1812889dc200bb8eed2597f82a # v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep template
        uses: azure/arm-deploy@a1361c2c2cd398621955b16ca32e01c65ea340f5 # v2
        with:
          scope: subscription
          region: ${{ github.event.inputs.location }}
          template: ./infra/main.bicep
          parameters: |
            location=${{ github.event.inputs.location }}
            resourceGroupName=${{ github.event.inputs.resourceGroupName }}
            functionAppName=${{ github.event.inputs.functionAppName }}
            keyVaultName=${{ github.event.inputs.keyVaultName }}
            storageAccountName=${{ github.event.inputs.storageAccountName }}
          deploymentName: opencode-pro-${{ github.run_number }}
          failOnStdErr: true

      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: function-app

      - name: Deploy to Azure Functions
        uses: azure/functions-action@c9cc8ee93d1285e2a17312cc8357dc1775955272 # v1
        with:
          app-name: ${{ github.event.inputs.functionAppName }}
          package: '.'
          respect-funcignore: true
