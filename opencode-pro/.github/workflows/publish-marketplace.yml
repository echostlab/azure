name: Publish Marketplace

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Run build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            src/
            node_modules/
            package.json
            package-lock.json
            app.yml

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log --oneline --no-decorate "${PREV_TAG}..HEAD")
          else
            CHANGELOG=$(git log --oneline --no-decorate HEAD)
          fi
          {
            echo 'changelog<<EOF'
            echo "$CHANGELOG"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            ## Changelog

            ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false
          generate_release_notes: true

  package:
    name: Package for Marketplace
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist

      - name: Create marketplace package
        run: |
          zip -r opencode-pro-marketplace.zip \
            src/ \
            node_modules/ \
            package.json \
            package-lock.json \
            app.yml

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: marketplace-package
          path: opencode-pro-marketplace.zip

  publish:
    name: Attach Package to Release
    runs-on: ubuntu-latest
    needs: [release, package]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: marketplace-package

      - name: Upload package to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: opencode-pro-marketplace.zip