name: OpenCode Pro
description: Enhanced AI coding assistant — Copilot-like features with config-file-driven operation
url: https://github.com/anomalyco/opencode-pro
public: true
default_events:
  - issues
  - issue_comment
  - pull_request
  - pull_request_review
  - pull_request_review_comment
  - check_run
  - check_suite
  - push
  - create
  - pull_request_review_thread
default_permissions:
  metadata: read
  issues: write
  pull_requests: write
  contents: write
  checks: write
  discussions: write