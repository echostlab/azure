#cloud-config
package_upgrade: true
packages:
  - curl
  - jq
  - tar
  - gzip
  - git
  - apt-transport-https
  - ca-certificates
  - software-properties-common

write_files:
  - path: /opt/runner-setup.sh
    permissions: '0755'
    content: |
      #!/bin/bash
      set -euo pipefail

      RUNNER_USER="runneradmin"
      RUNNER_DIR="/home/${RUNNER_USER}/actions-runner"
      GH_REPO="__GH_REPO__"
      GH_TOKEN="__GH_TOKEN__"

      # Guard clause: token must not be the placeholder
      if [[ -z "${GH_TOKEN}" || "${GH_TOKEN}" == "__GH_TOKEN__" ]]; then
        echo "ERROR: runner token not configured. GH_TOKEN is empty or still placeholder."
        exit 1
      fi

      # Create runner user if not exists
      if ! id -u "${RUNNER_USER}" >/dev/null 2>&1; then
        useradd -m -s /bin/bash "${RUNNER_USER}"
        usermod -aG sudo "${RUNNER_USER}"
        echo "${RUNNER_USER} ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/${RUNNER_USER}
      fi

      # Download and configure the runner
      mkdir -p "${RUNNER_DIR}"
      cd "${RUNNER_DIR}"

      echo "Downloading GitHub Actions runner..."
      RUNNER_VERSION=$(curl -s --retry 3 --retry-delay 10 https://api.github.com/repos/actions/runner/releases/latest | jq -r '.tag_name' | sed 's/^v//')

      if [[ -z "${RUNNER_VERSION}" ]]; then
        echo "ERROR: failed to fetch runner version from GitHub API"
        exit 1
      fi

      curl -o "actions-runner-linux-x64-${RUNNER_VERSION}.tar.gz" -L --retry 3 --retry-delay 10 \
        "https://github.com/actions/runner/releases/download/v${RUNNER_VERSION}/actions-runner-linux-x64-${RUNNER_VERSION}.tar.gz"
      tar xzf "actions-runner-linux-x64-${RUNNER_VERSION}.tar.gz"
      rm "actions-runner-linux-x64-${RUNNER_VERSION}.tar.gz"

      chown -R "${RUNNER_USER}:${RUNNER_USER}" "${RUNNER_DIR}"

      echo "Requesting registration token from GitHub..."
      REG_TOKEN=$(curl -s --retry 3 --retry-delay 10 -X POST \
        -H "Authorization: token ${GH_TOKEN}" \
        -H "Accept: application/vnd.github+json" \
        "https://api.github.com/repos/${GH_REPO}/actions/runners/registration-token" | jq -r '.token')

      if [[ -z "${REG_TOKEN}" || "${REG_TOKEN}" == "null" ]]; then
        echo "ERROR: failed to get registration token. Check GH_TOKEN permissions (needs repo scope)."
        exit 1
      fi

      echo "Configuring runner for repo: ${GH_REPO}"
      sudo -u "${RUNNER_USER}" ./config.sh \
        --url "https://github.com/${GH_REPO}" \
        --token "${REG_TOKEN}" \
        --name "$(hostname)" \
        --labels "azure,self-hosted,linux" \
        --unattended \
        --replace

      echo "Installing runner as a service..."
      ./svc.sh install "${RUNNER_USER}"
      ./svc.sh start

      echo "Runner setup complete. Runner is now online."

  - path: /etc/systemd/system/runner-setup.service
    content: |
      [Unit]
      Description=GitHub Actions Runner Setup
      After=network-online.target
      Wants=network-online.target
      StartLimitIntervalSec=600
      StartLimitBurst=5

      [Service]
      Type=oneshot
      ExecStart=/opt/runner-setup.sh
      RemainAfterExit=yes
      StandardOutput=journal
      StandardError=journal
      Restart=on-failure
      RestartSec=30
      ExecStartPost=/bin/sh -c 'echo "Runner setup completed at $(date -u)" > /var/log/runner-setup.success'

      [Install]
      WantedBy=multi-user.target

runcmd:
  - systemctl daemon-reload
  - systemctl enable runner-setup.service
  - systemctl start runner-setup.service